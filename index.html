<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Burger Builder Game</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: radial-gradient(circle at 50% 25%, #3a2818 0%, #1a0f08 80%);
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: #fff; user-select: none;
  }
  #canvasWrap { position: fixed; inset: 0; z-index: 1; }
  canvas { display: block; }

  .screen {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 24px; text-align: center;
  }
  .hidden { display: none !important; }

  /* ---- Start screen ---- */
  .game-logo { font-size: 56px; margin-bottom: 8px; animation: bob 2s ease-in-out infinite; }
  @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  .game-title { font-size: 28px; font-weight: 900; color: #ffd97a; letter-spacing: 1px; text-shadow: 0 3px 0 #7a3800; margin-bottom: 6px; }
  .game-sub { font-size: 13px; color: #ffb366; opacity: 0.9; margin-bottom: 32px; max-width: 280px; line-height: 1.5; }

  .big-btn {
    background: linear-gradient(180deg,#ffb547,#ff8c1a); color: #3a1500;
    border: none; border-radius: 50px; padding: 16px 48px;
    font-size: 18px; font-weight: 900; letter-spacing: 1px; cursor: pointer;
    box-shadow: 0 6px 0 #b85e00; transition: transform 0.1s, box-shadow 0.1s;
  }
  .big-btn:active { transform: translateY(3px); box-shadow: 0 3px 0 #b85e00; }
  .small-btn {
    background: rgba(0,0,0,0.5); color: #ffd97a; border: 1px solid rgba(255,200,80,0.3);
    border-radius: 30px; padding: 10px 24px; font-size: 13px; font-weight: 700;
    cursor: pointer; margin-top: 14px;
  }

  /* ---- Spin screen ---- */
  .spin-label { font-size: 14px; color: #ffb366; margin-bottom: 16px; letter-spacing: 2px; text-transform: uppercase; }
  .spin-display {
    background: rgba(0,0,0,0.5); border: 3px solid #ffd97a; border-radius: 24px;
    padding: 30px 40px; min-width: 260px; backdrop-filter: blur(10px);
    box-shadow: 0 0 40px rgba(255,200,80,0.3);
  }
  .spin-emoji { font-size: 64px; margin-bottom: 8px; }
  .spin-name { font-size: 22px; font-weight: 800; color: #fff; }

  /* ---- Recipe memorize screen ---- */
  .recipe-card {
    background: rgba(20,10,5,0.92); border: 2px solid #ffd97a; border-radius: 20px;
    padding: 24px; max-width: 320px; width: 100%; backdrop-filter: blur(12px);
  }
  .recipe-header { font-size: 18px; font-weight: 800; color: #ffd97a; margin-bottom: 4px; }
  .recipe-target { font-size: 13px; color: #ffb366; margin-bottom: 16px; }
  .recipe-list { display: flex; flex-direction: column-reverse; gap: 6px; margin-bottom: 18px; }
  .recipe-item {
    display: flex; align-items: center; gap: 10px; background: rgba(255,200,80,0.08);
    border-radius: 10px; padding: 8px 12px; font-size: 14px; font-weight: 600;
  }
  .recipe-item .num {
    background: #ffd97a; color: #3a1500; width: 22px; height: 22px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 900;
  }
  .recipe-item .em { font-size: 20px; }
  .memorize-timer {
    font-size: 32px; font-weight: 900; color: #ff6b4a;
    margin-bottom: 8px;
  }
  .memorize-hint { font-size: 12px; color: #ffb366; opacity: 0.8; }

  /* ---- Play screen ---- */
  .play-hud {
    position: fixed; top: 0; left: 0; right: 0; z-index: 20;
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 18px;
  }
  .timer-badge {
    background: rgba(0,0,0,0.6); border: 2px solid #ff6b4a; color: #ff6b4a;
    font-size: 20px; font-weight: 900; padding: 6px 16px; border-radius: 30px;
    backdrop-filter: blur(8px); min-width: 80px; text-align: center;
  }
  .timer-badge.warn { animation: pulse 0.5s ease-in-out infinite; border-color: #ff3030; color: #ff3030; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
  .target-badge {
    background: rgba(0,0,0,0.6); border: 1px solid rgba(255,200,80,0.4); color: #ffd97a;
    font-size: 13px; font-weight: 700; padding: 8px 14px; border-radius: 20px;
    backdrop-filter: blur(8px); display: flex; align-items: center; gap: 6px;
  }
  .stack-count {
    position: fixed; top: 70px; left: 50%; transform: translateX(-50%); z-index: 20;
    font-size: 12px; color: #ffb366; background: rgba(0,0,0,0.4); padding: 4px 12px;
    border-radius: 16px;
  }

  .ingredient-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
    padding: 14px 10px calc(14px + env(safe-area-inset-bottom));
    background: linear-gradient(to top, rgba(10,5,2,0.95), transparent);
  }
  .ing-grid {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; max-width: 440px; margin: 0 auto;
  }
  .ing-btn {
    background: rgba(40,25,12,0.9); border: 2px solid rgba(255,200,80,0.25);
    border-radius: 14px; padding: 8px 4px; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    transition: transform 0.08s, background 0.15s, border-color 0.15s;
  }
  .ing-btn:active { transform: scale(0.92); background: rgba(255,200,80,0.25); }
  .ing-btn .em { font-size: 26px; }
  .ing-btn .nm { font-size: 9px; color: #ffd0a0; font-weight: 600; }

  .undo-btn {
    position: fixed; bottom: calc(110px + env(safe-area-inset-bottom)); right: 16px; z-index: 21;
    background: rgba(0,0,0,0.6); border: 1px solid rgba(255,100,100,0.4); color: #ff8866;
    width: 48px; height: 48px; border-radius: 50%; font-size: 20px; cursor: pointer;
    backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center;
  }

  /* ---- Result screen ---- */
  .result-card {
    background: rgba(20,10,5,0.95); border: 3px solid; border-radius: 24px;
    padding: 32px 28px; max-width: 340px; width: 100%; backdrop-filter: blur(12px);
  }
  .result-card.win { border-color: #4ade80; box-shadow: 0 0 40px rgba(74,222,128,0.3); }
  .result-card.lose { border-color: #ff6b4a; box-shadow: 0 0 40px rgba(255,107,74,0.3); }
  .result-emoji { font-size: 64px; margin-bottom: 12px; }
  .result-title { font-size: 24px; font-weight: 900; margin-bottom: 8px; }
  .result-title.win { color: #4ade80; }
  .result-title.lose { color: #ff6b4a; }
  .result-detail { font-size: 14px; color: #ffd0a0; margin-bottom: 6px; line-height: 1.5; }
  .result-coins { font-size: 28px; font-weight: 900; color: #ffd97a; margin: 16px 0; }
  .accuracy-bar { background: rgba(255,255,255,0.1); border-radius: 10px; height: 12px; overflow: hidden; margin: 12px 0; }
  .accuracy-fill { height: 100%; border-radius: 10px; transition: width 0.8s ease; }

  .toast {
    position: fixed; top: 120px; left: 50%; transform: translateX(-50%) translateY(-20px);
    background: rgba(0,0,0,0.85); color: #fff; padding: 10px 20px; border-radius: 20px;
    font-size: 14px; font-weight: 700; z-index: 100; opacity: 0; transition: all 0.3s;
    pointer-events: none; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.good { border: 1px solid #4ade80; }
  .toast.bad { border: 1px solid #ff6b4a; }
</style>
</head>
<body>
<div id="canvasWrap"></div>

<!-- START -->
<div class="screen" id="startScreen">
  <div class="game-logo">🍔</div>
  <div class="game-title">BURGER BUILDER</div>
  <div class="game-sub">Hafalkan resep dalam 10 detik, lalu susun burger yang benar sebelum waktu habis!</div>
  <button class="big-btn" onclick="startGame()">▶ MAIN</button>
</div>

<!-- SPIN -->
<div class="screen hidden" id="spinScreen">
  <div class="spin-label">🎰 Memilih Pesanan...</div>
  <div class="spin-display">
    <div class="spin-emoji" id="spinEmoji">🍔</div>
    <div class="spin-name" id="spinName">...</div>
  </div>
</div>

<!-- MEMORIZE -->
<div class="screen hidden" id="memorizeScreen">
  <div class="recipe-card">
    <div class="recipe-header" id="memName">Classic Cheeseburger</div>
    <div class="recipe-target">Hafalkan urutan dari bawah ke atas!</div>
    <div class="recipe-list" id="recipeList"></div>
    <div class="memorize-timer" id="memTimer">10</div>
    <div class="memorize-hint">Resep akan hilang...</div>
    <button class="small-btn" onclick="skipMemorize()">Skip →</button>
  </div>
</div>

<!-- PLAY HUD -->
<div class="hidden" id="playHud">
  <div class="play-hud">
    <div class="target-badge"><span id="targetEmoji">🍔</span> <span id="targetName">Burger</span></div>
    <div class="timer-badge" id="playTimer">30</div>
  </div>
  <div class="stack-count" id="stackCount">0 layer tersusun</div>
  <button class="undo-btn" onclick="undoLayer()">↩</button>
  <div class="ingredient-bar">
    <div class="ing-grid" id="ingGrid"></div>
  </div>
</div>

<!-- RESULT -->
<div class="screen hidden" id="resultScreen">
  <div class="result-card" id="resultCard">
    <div class="result-emoji" id="resultEmoji">🎉</div>
    <div class="result-title" id="resultTitle">Perfect!</div>
    <div class="result-detail" id="resultDetail"></div>
    <div class="accuracy-bar"><div class="accuracy-fill" id="accFill"></div></div>
    <div class="result-coins" id="resultCoins">+50 🪙</div>
    <button class="big-btn" onclick="startGame()">Main Lagi</button>
    <button class="small-btn" onclick="goHome()">Menu Utama</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="importmap">
{ "imports": { "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.module.min.js" } }
</script>

<script type="module">
import * as THREE from 'three';

// ============ 3D SETUP ============
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x1a0f08, 8, 20);
const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 100);
camera.position.set(0, 2.5, 7);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.getElementById('canvasWrap').appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffeedd, 0.5));
const key = new THREE.DirectionalLight(0xfff0dd, 2.2);
key.position.set(4,8,5); key.castShadow = true;
key.shadow.mapSize.set(2048,2048);
key.shadow.camera.left=-6; key.shadow.camera.right=6; key.shadow.camera.top=6; key.shadow.camera.bottom=-6;
key.shadow.bias=-0.0004;
scene.add(key);
const fill = new THREE.DirectionalLight(0xffaa66, 0.6); fill.position.set(-5,3,2); scene.add(fill);
const rim = new THREE.PointLight(0xffcc88, 1.5, 20); rim.position.set(0,5,-4); scene.add(rim);

// plate
const plateMat = new THREE.MeshStandardMaterial({ color: 0xf5f5f5, roughness: 0.25, metalness: 0.1 });
const plate = new THREE.Mesh(new THREE.CylinderGeometry(3.2,2.9,0.25,64), plateMat);
plate.position.y = -0.1; plate.receiveShadow = true; scene.add(plate);
const rimM = new THREE.Mesh(new THREE.TorusGeometry(2.95,0.12,16,64), plateMat);
rimM.position.y=0.02; rimM.rotation.x=Math.PI/2; rimM.receiveShadow=true; scene.add(rimM);

function noiseTex(base, spot, density, size=128){
  const c=document.createElement('canvas'); c.width=c.height=size;
  const x=c.getContext('2d'); x.fillStyle=base; x.fillRect(0,0,size,size);
  for(let i=0;i<density;i++){ const px=Math.random()*size,py=Math.random()*size,r=1+Math.random()*3;
    x.fillStyle=spot; x.globalAlpha=0.3+Math.random()*0.5; x.beginPath(); x.arc(px,py,r,0,7); x.fill(); }
  x.globalAlpha=1; const t=new THREE.CanvasTexture(c); t.wrapS=t.wrapT=THREE.RepeatWrapping; return t;
}

const R = 1.6;
const builders = {
  bunBottom(){ const g=new THREE.Group(); const m=new THREE.Mesh(new THREE.CylinderGeometry(R,R*0.92,0.5,48),new THREE.MeshStandardMaterial({map:noiseTex('#d99a4a','#b87a2a',200),roughness:0.8,color:0xe0a85a})); m.position.y=0.25; m.castShadow=m.receiveShadow=true; g.add(m); g.userData.height=0.5; return g; },
  bunTop(){ const g=new THREE.Group(); const mat=new THREE.MeshStandardMaterial({map:noiseTex('#dba04e','#c08030',150),roughness:0.75,color:0xe5ad5e}); const d=new THREE.Mesh(new THREE.SphereGeometry(R,48,32,0,7,0,Math.PI*0.5),mat); d.scale.y=0.7; d.castShadow=d.receiveShadow=true; g.add(d); const b=new THREE.Mesh(new THREE.CylinderGeometry(R,R*0.95,0.3,48),mat); b.position.y=-0.15; b.castShadow=true; g.add(b); const sm=new THREE.MeshStandardMaterial({color:0xfff5d0,roughness:0.5}); const sg=new THREE.SphereGeometry(0.05,8,6); for(let i=0;i<24;i++){ const s=new THREE.Mesh(sg,sm); const th=Math.random()*7,ph=Math.random()*Math.PI*0.35,rr=R*0.95; s.position.set(Math.sin(ph)*Math.cos(th)*rr,Math.cos(ph)*rr*0.7+0.05,Math.sin(ph)*Math.sin(th)*rr); s.scale.set(1,0.5,1.6); s.lookAt(0,2,0); s.castShadow=true; g.add(s);} g.userData.height=0.85; return g; },
  patty(){ const g=new THREE.Group(); const t=noiseTex('#5a2c0e','#3d1c08',400); const m=new THREE.Mesh(new THREE.CylinderGeometry(R*1.02,R*1.02,0.42,48),new THREE.MeshStandardMaterial({map:t,roughness:0.85,color:0x6b3410,bumpMap:t,bumpScale:0.05})); m.position.y=0.21; m.castShadow=m.receiveShadow=true; g.add(m); g.userData.height=0.42; return g; },
  chicken(){ const g=new THREE.Group(); const t=noiseTex('#d4a050','#a87830',350); const geo=new THREE.CylinderGeometry(R*1.05,R*1.0,0.4,48); const p=geo.attributes.position; for(let i=0;i<p.count;i++){ if(Math.abs(p.getY(i))>0.15){ p.setX(i,p.getX(i)+(Math.random()-0.5)*0.08); p.setZ(i,p.getZ(i)+(Math.random()-0.5)*0.08);}} geo.computeVertexNormals(); const m=new THREE.Mesh(geo,new THREE.MeshStandardMaterial({map:t,roughness:0.9,color:0xc89548,bumpMap:t,bumpScale:0.08})); m.position.y=0.2; m.castShadow=m.receiveShadow=true; g.add(m); g.userData.height=0.4; return g; },
  cheese(){ const g=new THREE.Group(); const mat=new THREE.MeshStandardMaterial({color:0xffc324,roughness:0.4,metalness:0.05}); const m=new THREE.Mesh(new THREE.BoxGeometry(R*1.9,0.1,R*1.9),mat); m.position.y=0.05; m.rotation.y=Math.PI/4; m.castShadow=m.receiveShadow=true; g.add(m); const dg=new THREE.ConeGeometry(0.12,0.35,8); for(let i=0;i<4;i++){ const dr=new THREE.Mesh(dg,mat); const a=i*Math.PI/2+Math.PI/4; dr.position.set(Math.cos(a)*R*1.15,-0.1,Math.sin(a)*R*1.15); dr.castShadow=true; g.add(dr);} g.userData.height=0.12; return g; },
  lettuce(){ const g=new THREE.Group(); const m1=new THREE.MeshStandardMaterial({color:0x6cbf3f,roughness:0.7,side:2}); const m2=new THREE.MeshStandardMaterial({color:0x4a9528,roughness:0.7,side:2}); for(let i=0;i<16;i++){ const a=(i/16)*7; const l=new THREE.Mesh(new THREE.SphereGeometry(0.5,8,6,0,Math.PI),i%2?m1:m2); l.position.set(Math.cos(a)*R*0.95,0.1+Math.sin(i*1.5)*0.08,Math.sin(a)*R*0.95); l.scale.set(0.9,0.35,0.6); l.rotation.y=a; l.rotation.z=Math.random()*0.4-0.2; l.castShadow=true; g.add(l);} g.userData.height=0.25; return g; },
  tomato(){ const g=new THREE.Group(); const m=new THREE.Mesh(new THREE.CylinderGeometry(R*0.92,R*0.92,0.18,32),new THREE.MeshStandardMaterial({color:0xe23b2e,roughness:0.35,metalness:0.05})); m.position.y=0.09; m.castShadow=m.receiveShadow=true; g.add(m); g.userData.height=0.18; return g; },
  onion(){ const g=new THREE.Group(); const mat=new THREE.MeshStandardMaterial({color:0xe8d5f0,roughness:0.5,transparent:true,opacity:0.85,side:2}); for(let r=0.6;r<=R*0.95;r+=0.35){ const ring=new THREE.Mesh(new THREE.TorusGeometry(r,0.04,8,32),mat); ring.rotation.x=Math.PI/2; ring.position.y=0.08; ring.castShadow=true; g.add(ring);} g.userData.height=0.15; return g; },
  bacon(){ const g=new THREE.Group(); const m=new THREE.MeshStandardMaterial({color:0xa83232,roughness:0.6}); const fm=new THREE.MeshStandardMaterial({color:0xe8c0b0,roughness:0.5}); for(let i=0;i<3;i++){ const sg=new THREE.BoxGeometry(R*1.8,0.08,0.4); const p=sg.attributes.position; for(let j=0;j<p.count;j++) p.setY(j,p.getY(j)+Math.sin(p.getX(j)*3)*0.06); sg.computeVertexNormals(); const s=new THREE.Mesh(sg,i%2?m:fm); s.position.set(0,0.06,(i-1)*0.5); s.rotation.y=i*0.2-0.2; s.castShadow=true; g.add(s);} g.userData.height=0.16; return g; },
  egg(){ const g=new THREE.Group(); const w=new THREE.Mesh(new THREE.CylinderGeometry(R*0.9,R*0.85,0.12,32),new THREE.MeshStandardMaterial({color:0xfffef5,roughness:0.4})); w.position.y=0.06; w.castShadow=w.receiveShadow=true; g.add(w); const y=new THREE.Mesh(new THREE.SphereGeometry(0.4,24,16),new THREE.MeshStandardMaterial({color:0xffb01f,roughness:0.3,emissive:0x331a00,emissiveIntensity:0.2})); y.scale.y=0.5; y.position.y=0.16; y.castShadow=true; g.add(y); g.userData.height=0.2; return g; },
  ketchup(){ return sauce(0xc01818); },
  mustard(){ return sauce(0xe5b800); },
  mayo(){ return sauce(0xfff8e0); },
};
function sauce(color){ const g=new THREE.Group(); const m=new THREE.Mesh(new THREE.CylinderGeometry(R*0.85,R*0.85,0.08,32),new THREE.MeshStandardMaterial({color,roughness:0.3,metalness:0.1})); m.position.y=0.04; m.castShadow=m.receiveShadow=true; g.add(m); g.userData.height=0.08; return g; }

const INGS = {
  bunBottom:{name:'Bun Bawah',emoji:'🍞'}, bunTop:{name:'Bun Atas',emoji:'🍔'},
  patty:{name:'Daging',emoji:'🥩'}, chicken:{name:'Ayam',emoji:'🍗'},
  cheese:{name:'Keju',emoji:'🧀'}, lettuce:{name:'Selada',emoji:'🥬'},
  tomato:{name:'Tomat',emoji:'🍅'}, onion:{name:'Bawang',emoji:'🧅'},
  bacon:{name:'Bacon',emoji:'🥓'}, egg:{name:'Telur',emoji:'🍳'},
  ketchup:{name:'Saus',emoji:'🔴'}, mustard:{name:'Mustard',emoji:'🟡'}, mayo:{name:'Mayo',emoji:'⚪'},
};

const BURGERS = [
  { name:'Classic Cheeseburger', emoji:'🍔', layers:['bunBottom','ketchup','patty','cheese','lettuce','tomato','bunTop'] },
  { name:'Double Bacon', emoji:'🥓', layers:['bunBottom','mayo','patty','cheese','bacon','patty','cheese','bunTop'] },
  { name:'Chicken Deluxe', emoji:'🍗', layers:['bunBottom','mayo','chicken','lettuce','tomato','onion','bunTop'] },
  { name:'Breakfast Burger', emoji:'🍳', layers:['bunBottom','patty','cheese','egg','bacon','bunTop'] },
  { name:'Veggie Stack', emoji:'🥬', layers:['bunBottom','mustard','lettuce','tomato','onion','cheese','bunTop'] },
  { name:'Mega Tower', emoji:'🗼', layers:['bunBottom','ketchup','patty','cheese','bacon','patty','cheese','lettuce','tomato','bunTop'] },
];

// ============ GAME STATE ============
let targetBurger = null;
let placed = [];        // {key, mesh}
let stackY = 0.25;
let playTime = 30;
let playTimer = null;
let memTimer = null;
let coins = 0;
const burgerGroup = new THREE.Group();
scene.add(burgerGroup);

// ============ SCREENS ============
function show(id){ document.querySelectorAll('.screen, #playHud').forEach(s=>s.classList.add('hidden')); if(id) document.getElementById(id).classList.remove('hidden'); }

window.goHome = () => { clearBurger(); show('startScreen'); };

window.startGame = () => {
  clearBurger();
  show('spinScreen');
  spinForBurger();
};

function spinForBurger(){
  const spinEmoji = document.getElementById('spinEmoji');
  const spinName = document.getElementById('spinName');
  let spins = 0;
  const totalSpins = 18 + Math.floor(Math.random()*6);
  const finalIdx = Math.floor(Math.random()*BURGERS.length);

  const spinInt = setInterval(()=>{
    const b = BURGERS[spins % BURGERS.length];
    spinEmoji.textContent = b.emoji;
    spinName.textContent = b.name;
    spins++;
    if (spins >= totalSpins){
      clearInterval(spinInt);
      targetBurger = BURGERS[finalIdx];
      spinEmoji.textContent = targetBurger.emoji;
      spinName.textContent = targetBurger.name;
      spinEmoji.style.transform = 'scale(1.3)';
      setTimeout(()=>{ spinEmoji.style.transform='scale(1)'; showMemorize(); }, 900);
    }
  }, 80 + spins*4);
}

function showMemorize(){
  show('memorizeScreen');
  document.getElementById('memName').textContent = targetBurger.emoji + ' ' + targetBurger.name;
  const list = document.getElementById('recipeList');
  list.innerHTML = '';
  targetBurger.layers.forEach((key, i)=>{
    const ing = INGS[key];
    const div = document.createElement('div');
    div.className = 'recipe-item';
    div.innerHTML = `<div class="num">${i+1}</div><span class="em">${ing.emoji}</span><span>${ing.name}</span>`;
    list.appendChild(div);
  });

  let t = 10;
  document.getElementById('memTimer').textContent = t;
  memTimer = setInterval(()=>{
    t--;
    document.getElementById('memTimer').textContent = t;
    if (t <= 0){ clearInterval(memTimer); startPlay(); }
  }, 1000);
}

window.skipMemorize = () => { clearInterval(memTimer); startPlay(); };

function startPlay(){
  show(null);
  document.getElementById('playHud').classList.remove('hidden');
  document.getElementById('targetEmoji').textContent = targetBurger.emoji;
  document.getElementById('targetName').textContent = targetBurger.name;

  // Build ingredient buttons - shuffle all available ingredients
  const allKeys = Object.keys(INGS);
  const grid = document.getElementById('ingGrid');
  grid.innerHTML = '';
  allKeys.forEach(key=>{
    const ing = INGS[key];
    const btn = document.createElement('div');
    btn.className = 'ing-btn';
    btn.innerHTML = `<span class="em">${ing.emoji}</span><span class="nm">${ing.name}</span>`;
    btn.onclick = () => placeIngredient(key);
    grid.appendChild(btn);
  });

  playTime = 30;
  updateTimer();
  playTimer = setInterval(()=>{
    playTime--;
    updateTimer();
    if (playTime <= 0){ clearInterval(playTimer); finishGame(); }
  }, 1000);
}

function updateTimer(){
  const el = document.getElementById('playTimer');
  el.textContent = playTime;
  el.classList.toggle('warn', playTime <= 10);
}

function placeIngredient(key){
  const mesh = builders[key]();
  const targetY = stackY;
  mesh.position.y = targetY + 6;
  mesh.scale.set(0.01,0.01,0.01);
  burgerGroup.add(mesh);
  placed.push({ key, mesh });

  const start = performance.now();
  function drop(now){
    const t = Math.min((now-start)/400, 1);
    const e = 1-Math.pow(1-t,3);
    mesh.position.y = (targetY+6)*(1-e) + targetY*e;
    const s = Math.min(t*1.3,1);
    mesh.scale.set(s,s,s);
    if (t<1) requestAnimationFrame(drop);
    else { mesh.position.y=targetY; mesh.scale.set(1,1,1); }
  }
  requestAnimationFrame(drop);

  stackY += mesh.userData.height;
  document.getElementById('stackCount').textContent = placed.length + ' layer tersusun';

  // Auto-finish if placed a top bun
  if (key === 'bunTop' && placed.length > 1){
    setTimeout(()=>{ clearInterval(playTimer); finishGame(); }, 500);
  }
}

window.undoLayer = () => {
  if (placed.length === 0) return;
  const last = placed.pop();
  stackY -= last.mesh.userData.height;
  burgerGroup.remove(last.mesh);
  document.getElementById('stackCount').textContent = placed.length + ' layer tersusun';
};

function finishGame(){
  clearInterval(playTimer);
  // Compare placed vs target
  const target = targetBurger.layers;
  const player = placed.map(p=>p.key);

  let correct = 0;
  const maxLen = Math.max(target.length, player.length);
  for (let i=0;i<target.length;i++){
    if (player[i] === target[i]) correct++;
  }
  const accuracy = Math.round((correct / maxLen) * 100);
  const isPerfect = (correct === target.length && player.length === target.length);

  showResult(accuracy, isPerfect, correct, target.length);
}

function showResult(accuracy, perfect, correct, total){
  show('resultScreen');
  const card = document.getElementById('resultCard');
  const title = document.getElementById('resultTitle');
  const emoji = document.getElementById('resultEmoji');
  const detail = document.getElementById('resultDetail');
  const coinsEl = document.getElementById('resultCoins');
  const accFill = document.getElementById('accFill');

  let earned = 0;
  if (perfect){
    card.className = 'result-card win';
    title.className = 'result-title win';
    title.textContent = 'PERFECT! 🎉';
    emoji.textContent = '🏆';
    earned = 50;
  } else if (accuracy >= 60){
    card.className = 'result-card win';
    title.className = 'result-title win';
    title.textContent = 'Lumayan!';
    emoji.textContent = '😋';
    earned = Math.round(accuracy / 100 * 30);
  } else {
    card.className = 'result-card lose';
    title.className = 'result-title lose';
    title.textContent = 'Yah, Salah!';
    emoji.textContent = '😅';
    earned = accuracy >= 30 ? 5 : 0;
  }

  detail.textContent = `${correct} dari ${total} layer benar`;
  coinsEl.textContent = (earned > 0 ? '+' : '') + earned + ' 🪙';
  coins += earned;

  accFill.style.width = '0%';
  accFill.style.background = perfect ? '#4ade80' : accuracy >= 60 ? '#ffd97a' : '#ff6b4a';
  setTimeout(()=>{ accFill.style.width = accuracy + '%'; }, 100);

  if (perfect) celebrate();
}

function celebrate(){
  const start = performance.now();
  const startRot = burgerGroup.rotation.y;
  function anim(now){
    const t = Math.min((now-start)/1000, 1);
    const e = 1-Math.pow(1-t,3);
    burgerGroup.rotation.y = startRot + e*Math.PI*2;
    if (t<1) requestAnimationFrame(anim);
  }
  requestAnimationFrame(anim);
}

function clearBurger(){
  placed.forEach(p=>burgerGroup.remove(p.mesh));
  placed = [];
  stackY = 0.25;
  burgerGroup.rotation.y = 0;
  if (playTimer) clearInterval(playTimer);
  if (memTimer) clearInterval(memTimer);
  document.getElementById('stackCount').textContent = '0 layer tersusun';
}

// ============ CAMERA + RENDER ============
let isDrag=false, px=0, py=0, camA=0, camH=2.5;
renderer.domElement.addEventListener('pointerdown', e=>{ isDrag=true; px=e.clientX; py=e.clientY; });
addEventListener('pointerup', ()=>isDrag=false);
addEventListener('pointermove', e=>{ if(!isDrag)return; camA-=(e.clientX-px)*0.008; camH=Math.max(1,Math.min(5,camH-(e.clientY-py)*0.01)); px=e.clientX; py=e.clientY; });

function animate(){
  requestAnimationFrame(animate);
  camera.position.x = Math.sin(camA)*7;
  camera.position.z = Math.cos(camA)*7;
  camera.position.y = camH;
  camera.lookAt(0, Math.max(0.8, stackY*0.4), 0);
  renderer.render(scene, camera);
}
addEventListener('resize', ()=>{ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); });
animate();
</script>
